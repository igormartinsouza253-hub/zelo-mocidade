<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Reunião de Jovens - Controle de Presença</title>
  <desc id="desc">Ícone de igreja estilizada com marca de presença em forma de check, representando jovens marcando presença em um culto.</desc>
  <!-- Corpo da igreja -->
  <rect x="12" y="26" width="40" height="24" rx="4" ry="4" fill="none" stroke="#2c7ec2" stroke-width="2" />
  <!-- Telhado -->
  <path d="M10 26 L32 12 L54 26" fill="none" stroke="#2c7ec2" stroke-width="2" stroke-linejoin="round" />
  <!-- Porta central -->
  <rect x="28" y="32" width="8" height="12" rx="2" ry="2" fill="none" stroke="#2c7ec2" stroke-width="2" />
  <!-- Check de presença -->
  <path d="M18 46 L25 53 L38 38" fill="none" stroke="#259b46" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
</svg>
