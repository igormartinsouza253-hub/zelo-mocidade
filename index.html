<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zelo - Mocidade CCB</title>
    <meta name="description" content="Sistema de gestão e controle de frequência para Reunião de Jovens. Gerencie membros, registre reuniões e acompanhe estatísticas de presença.">
    <meta name="author" content="Reunião de Jovens" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#11161c" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <style>
      :root {
        --initial-primary: 158 64% 52%;
        --initial-background: 0 0% 98%;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      #app-loading-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: hsl(var(--background, var(--initial-background)));
      }

      .app-loading-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .app-loading-logo {
        width: 96px;
        height: 96px;
        padding: 16px;
        border-radius: 28px;
        background: hsl(var(--primary, var(--initial-primary)));
        box-shadow: 0 18px 42px -30px rgb(0 0 0 / 0.55);
        overflow: hidden;
      }

      .app-loading-logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .app-loading-bar {
        width: 96px;
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: hsl(var(--primary, var(--initial-primary)) / 0.16);
      }

      .app-loading-bar::before {
        content: "";
        display: block;
        width: 50%;
        height: 100%;
        border-radius: inherit;
        background: hsl(var(--primary, var(--initial-primary)));
        animation: initial-loading-bar 1.1s ease-in-out infinite;
      }

      @keyframes initial-loading-bar {
        0% {
          transform: translateX(-110%);
        }
        50% {
          transform: translateX(60%);
        }
        100% {
          transform: translateX(210%);
        }
      }
    </style>

    <!-- Preconnect to font domains for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Load fonts asynchronously to prevent render blocking -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" media="print" onload="this.media='all'" />
    <!-- Fallback for browsers with JavaScript disabled -->
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" />
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap" />
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" />
    </noscript>

    
    
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/pwa-512.png">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/pwa-512.png">
  
  
  
  
  <meta property="og:title" content="Zelo - Mocidade CCB">
  <meta name="twitter:title" content="Zelo - Mocidade CCB">
  <meta property="og:description" content="Sistema de gestão e controle de frequência para Reunião de Jovens. Gerencie membros, registre reuniões e acompanhe estatísticas de presença.">
  <meta name="twitter:description" content="Sistema de gestão e controle de frequência para Reunião de Jovens. Gerencie membros, registre reuniões e acompanhe estatísticas de presença.">
</head>

  <body>
    <div id="app-loading-screen" aria-label="Carregando Zelo">
      <div class="app-loading-card">
        <div class="app-loading-logo">
          <img src="/logo-zelo-transparent.png" alt="Zelo" />
        </div>
        <div class="app-loading-bar"></div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var recoveryFlag = "zelo_recovered_from_stale_app";

        function isAppAssetError(event) {
          var target = event && event.target;
          var tag = target && target.tagName;
          var src = target && (target.src || target.href);
          var message = String((event && (event.message || event.reason)) || "");

          return (
            (src && (tag === "SCRIPT" || tag === "LINK")) ||
            /failed to fetch dynamically imported module|importing a module script failed|loading chunk|chunkloaderror|dynamically imported module/i.test(
              message,
            )
          );
        }

        function clearCachesAndReload() {
          if (sessionStorage.getItem(recoveryFlag) === "1") return;
          sessionStorage.setItem(recoveryFlag, "1");

          var clearServiceWorkers =
            "serviceWorker" in navigator
              ? navigator.serviceWorker
                  .getRegistrations()
                  .then(function (regs) {
                    return Promise.all(
                      regs.map(function (registration) {
                        return registration.unregister();
                      }),
                    );
                  })
              : Promise.resolve();

          var clearCaches =
            "caches" in window
              ? caches.keys().then(function (names) {
                  return Promise.all(
                    names.map(function (name) {
                      return caches.delete(name);
                    }),
                  );
                })
              : Promise.resolve();

          Promise.all([clearServiceWorkers, clearCaches]).finally(function () {
            window.location.reload();
          });
        }

        window.addEventListener(
          "error",
          function (event) {
            if (isAppAssetError(event)) clearCachesAndReload();
          },
          true,
        );

        window.addEventListener("unhandledrejection", function (event) {
          if (isAppAssetError(event)) clearCachesAndReload();
        });

        window.setTimeout(function () {
          var loader = document.getElementById("app-loading-screen");
          var root = document.getElementById("root");
          if (!loader || (root && root.children.length > 0)) return;

          loader.innerHTML =
            '<div class="app-loading-card">' +
            '<div class="app-loading-logo"><img src="/logo-zelo-transparent.png" alt="Zelo" /></div>' +
            '<p style="margin:0;font:600 14px system-ui;color:hsl(var(--foreground, 222 47% 11%));">Atualizando o app...</p>' +
            '<button type="button" style="border:0;border-radius:999px;padding:10px 16px;background:hsl(var(--primary, 158 64% 52%));color:white;font:700 12px system-ui;letter-spacing:.04em;text-transform:uppercase;">Recarregar</button>' +
            "</div>";

          var button = loader.querySelector("button");
          if (button) button.addEventListener("click", clearCachesAndReload);
        }, 12000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
